# Blueprint Render : https://render.com/docs/blueprint-spec
# Crée un Web Service Node ; ajoutez MongoDB Atlas (externe) + variables d’environnement dans le tableau de bord.

services:
  - type: web
    name: the-bees
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install && npm run render-build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_PASSWORD_HASH
        sync: false
      - key: ADMIN_2FA_EMAIL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false
